name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run translation validation
        id: validate
        run: |
          set +e
          node scripts/validate-translations.mjs > /tmp/validation-output.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        shell: bash

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/validation-output.txt', 'utf8').trim();
            const passed = '${{ steps.validate.outputs.exit_code }}' === '0';
            const marker = '<!-- gtd-translation-validation -->';
            const header = passed
              ? '### ✅ Translation Validation Passed'
              : '### ❌ Translation Validation Failed';
            const body = `${marker}\n${header}\n\n\`\`\`\n${raw}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Build
        run: npm run build
